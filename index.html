:root {
  --a1:#ff6b1a;--a2:#ff2020;--a3:#39ff6e;--a4:#ffa020;--a5:#ff4500;--wt:#d4820a;
  --bg:#000;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
  --text:#e8f0fe;--muted:#8a9bb0;
  --fh:'Barlow Condensed',sans-serif;--fb:'Barlow',sans-serif;--fm:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;padding-bottom:60px}
#bg-img{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center top;opacity:.15;z-index:0;pointer-events:none}
#app{position:relative;z-index:1;max-width:640px;margin:0 auto}
#header{background:linear-gradient(180deg,rgba(255,107,26,.12) 0%,transparent 100%);border-bottom:1px solid rgba(255,107,26,.2);padding:22px 20px 16px;text-align:center}
#header h1{display:none}
#header .sub{color:var(--muted);font-family:var(--fm);font-size:10px;margin-bottom:14px}
#hstats{display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.hs{text-align:center}
.hs-v{font-family:var(--fh);font-weight:700;font-size:18px}
.hs-l{color:var(--muted);font-family:var(--fm);font-size:8px;text-transform:uppercase;letter-spacing:1px}
#tabs{display:flex;border-bottom:1px solid var(--border);padding:0 10px;overflow-x:auto;scrollbar-width:none}
#tabs::-webkit-scrollbar{display:none}
.tb{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);padding:12px 13px;font-family:var(--fh);font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:all .2s}
.tb.on{color:var(--a1);border-bottom-color:var(--a1)}.tb.end-on{color:#a855f7;border-bottom-color:#a855f7}
#content{padding:16px 14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:10px}
.sl{color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid rgba(255,255,255,.06);padding-bottom:4px;margin:12px 0 8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
label{color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-family:var(--fm);display:block;margin-bottom:4px}
input,select{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text);padding:10px 14px;font-size:14px;font-family:var(--fm);width:100%;outline:none;transition:border-color .2s}
input:focus{border-color:var(--a1)}
.bp{background:linear-gradient(135deg,rgba(255,107,26,.15),rgba(255,107,26,.3));border:1px solid var(--a1);border-radius:12px;color:var(--a1);padding:12px;font-family:var(--fh);font-size:15px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;transition:all .2s;margin-top:4px}
.bg2{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:12px;color:var(--muted);padding:10px;font-family:var(--fh);font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:6px}
.stabs{display:flex;gap:8px;margin-bottom:12px}
.stb{flex:1;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:var(--muted);padding:8px 0;font-family:var(--fh);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-align:center;transition:all .2s}
.stb.on{background:rgba(255,107,26,.15);border-color:var(--a1);color:var(--a1)}
.sc{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:13px;margin-bottom:10px}
.sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.sd{font-family:var(--fh);font-weight:700;font-size:16px;color:var(--a1)}
.sm{color:var(--muted);font-family:var(--fm);font-size:10px;margin-top:2px}
.badge{display:inline-flex;align-items:center;gap:7px;border-radius:8px;padding:5px 11px;margin-bottom:6px;font-family:var(--fh)}
.bv{font-weight:700;font-size:17px}
.bu{color:var(--muted);font-family:var(--fm);font-size:9px}
.sm2{background:rgba(255,255,255,.03);border-radius:7px;padding:6px 9px}
.sl2{color:var(--muted);font-size:8px;font-family:var(--fm);text-transform:uppercase}
.sv{font-family:var(--fh);font-weight:700;font-size:14px}
.ab{display:flex;gap:7px}
.ib{background:none;border:none;cursor:pointer;font-size:14px;padding:2px}
.cfd{text-align:center;padding:8px}
.cfd p{color:var(--a2);font-family:var(--fm);font-size:12px;margin-bottom:10px}
.cfdb{display:flex;gap:10px;justify-content:center}
.bda{background:rgba(255,32,32,.2);border:1px solid var(--a2);border-radius:8px;color:var(--a2);padding:7px 18px;cursor:pointer;font-family:var(--fh);font-size:13px;font-weight:700}
.bca{background:transparent;border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--muted);padding:7px 18px;cursor:pointer;font-family:var(--fh);font-size:13px}
.cal-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.cal-n{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:var(--text);padding:6px 14px;cursor:pointer;font-size:16px}
.cal-t{font-family:var(--fh);font-weight:700;font-size:20px;color:var(--a1);letter-spacing:1px;text-transform:uppercase}
.cal-leg{display:flex;gap:16px;justify-content:center;margin-bottom:12px}
.cal-li{display:flex;align-items:center;gap:6px}
.dot{width:10px;height:10px;border-radius:50%}
.cal-g{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dn{text-align:center;color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;padding-bottom:4px}
.cal-c{border:1px solid transparent;border-radius:10px;padding:6px 2px;text-align:center;min-height:52px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:3px;transition:all .15s}
.cal-c.hs2{cursor:pointer;background:rgba(255,255,255,.05)}
.cal-c.sel{background:rgba(255,107,26,.15)!important;border-color:var(--a1)!important}
.cal-dots{display:flex;gap:3px;justify-content:center;min-height:12px}
.cal-num{font-family:var(--fh);font-size:16px;line-height:1}
.cal-cnt{font-family:var(--fm);font-size:8px;color:var(--muted)}
.cal-det{background:rgba(255,107,26,.06);border:1px solid rgba(255,107,26,.3);border-radius:14px;padding:14px 16px;margin-top:12px}
.hb-bg{background:rgba(255,255,255,.06);border-radius:99px;height:8px;overflow:hidden;margin-top:8px}
.hb-f{height:100%;border-radius:99px;transition:width .6s ease}
.rr{display:flex;align-items:center;gap:10px;border-radius:9px;padding:7px 10px;cursor:pointer;transition:all .15s;margin-bottom:4px}
.rd{border-radius:0 0 10px 10px;padding:10px 12px;margin-top:-4px;margin-bottom:4px}
.stc{background:rgba(255,255,255,.04);border-radius:14px;padding:14px 16px;display:flex;flex-direction:column;gap:4px}
.stc-l{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:1.2px;font-family:var(--fm)}
.stc-v{font-family:var(--fh);font-weight:700;font-size:22px}
.stc-u{color:var(--muted);font-size:10px;font-family:var(--fm);font-weight:400;margin-left:3px}
.cw{margin-bottom:18px}
.cl{color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.pc{background:rgba(255,69,0,.1);border:1px solid rgba(255,69,0,.3);border-radius:10px;padding:8px 14px;font-family:var(--fm);font-size:12px;color:var(--a5);margin-bottom:4px}
.empty{text-align:center;color:var(--muted);padding:40px 20px;font-family:var(--fm);font-size:13px}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(57,255,110,.15);border:1px solid var(--a3);border-radius:12px;color:var(--a3);padding:10px 20px;font-family:var(--fh);font-size:14px;font-weight:700;letter-spacing:1px;z-index:999;opacity:0;transition:all .3s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:4px}
</style>
</head>

// UTILS
function fd(m){if(!m&&m!==0)return'—';const h=Math.floor(m/60),mm=m%60;return h?`${h}h ${mm}m`:`${mm}m`;}
function pace(d,di){if(!d||!di)return null;const s=(d*60)/di;return`${Math.floor(s/60)}:${String(Math.round(s%60)).padStart(2,'0')}`;}
function fdate(d){return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short',year:'numeric'});}
function fdshort(d){return new Date(d+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short'});}
function isExt(s){return!!(s.note&&s.note.includes('exterior'));}
function wForDate(date){let l=null;for(const w of weights){if(w.date<=date)l=w.weight;else break;}return l;}
function tots(arr){
  const n=arr.length,dur=arr.reduce((a,s)=>a+(s.duration||0),0),dist=arr.reduce((a,s)=>a+(s.distance||0),0);
  const cal=arr.reduce((a,s)=>a+(calAdj(s)||0),0),steps=arr.reduce((a,s)=>a+(s.steps||0),0);
  const ps=arr.filter(s=>s.duration&&s.distance).map(s=>(s.duration*60)/s.distance);
  const aps=ps.length?ps.reduce((a,b)=>a+b,0)/ps.length:0;
  const ap=aps?`${Math.floor(aps/60)}:${String(Math.round(aps%60)).padStart(2,'0')}`:'—';
  const as=n?(arr.reduce((a,s)=>a+(s.speedAvg||0),0)/n).toFixed(1):'—';
  const ah=n?Math.round(arr.reduce((a,s)=>a+(s.hrAvg||0),0)/n):'—';
  return{n,dur,dist,cal,steps,ap,as,ah};
}

function fcZone(hr){
  if(!hr)return null;
  return FC_ZONES.find(z=>hr>=z.min&&hr<=z.max)||FC_ZONES[FC_ZONES.length-1];
}
function fatBurnPct(hr){
  if(!hr)return null;
  const pctFCMax=hr/185;
  if(pctFCMax<0.60)return 85;
  if(pctFCMax<0.70)return 65;
  if(pctFCMax<0.80)return 50;
  if(pctFCMax<0.90)return 35;
  return 15;
}
function fatBurnData(s){
  const pct=fatBurnPct(s.hrAvg);
  if(!pct||!s.calories)return null;
  const calW=calAdj(s);
  const calT=s.totalCalories||0;
  const fatCalW=Math.round(calW*(pct/100));
  const fatGW=Math.round(fatCalW/9);
  const fatCalT=calT?Math.round(calT*(pct/100)):null;
  const fatGT=fatCalT?Math.round(fatCalT/9):null;
  return{pct,fatCalW,fatGW,fatCalT,fatGT};
}
function calAdj(s){
  if(!s.calories)return s.calories;
  if(!s.incline||s.incline===0)return s.calories;
  return Math.round(s.calories*(1+s.incline*0.04));
}
function hasAdj(s){return s.incline&&s.incline>0;}

const ENDURANCE_IDS=new Set(['s21','s17','s15','s10','s5b','s2']);
function getStreaks(){
  const dates=[...new Set(sessions.map(s=>s.date))].sort();
  if(!dates.length)return{cur:0,max:0,lastDate:null};
  let cur=1,max=1,tmp=1;
  for(let i=1;i<dates.length;i++){
    const a=new Date(dates[i-1]+'T12:00:00'),b=new Date(dates[i]+'T12:00:00');
    const diff=(b-a)/(1000*60*60*24);
    if(diff===1){tmp++;max=Math.max(max,tmp);}else tmp=1;
  }
  const today=new Date();today.setHours(12,0,0,0);
  const last=new Date(dates[dates.length-1]+'T12:00:00');
  const diffToday=(today-last)/(1000*60*60*24);
  if(diffToday<=1){
    cur=1;
    for(let i=dates.length-2;i>=0;i--){
      const a=new Date(dates[i]+'T12:00:00'),b=new Date(dates[i+1]+'T12:00:00');
      if((b-a)/(1000*60*60*24)===1)cur++;else break;
    }
  }else{cur=0;}
  return{cur,max,lastDate:dates[dates.length-1]};
}
function weekSessions(offsetWeeks=0){
  const now=new Date();
  const day=now.getDay();
  const monday=new Date(now);monday.setDate(now.getDate()-((day+6)%7)-offsetWeeks*7);monday.setHours(0,0,0,0);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  return sessions.filter(s=>{const d=new Date(s.date+'T12:00:00');return d>=monday&&d<=sunday;});
}
function weightTrend(){
  if(weights.length<2)return null;
  const n=Math.min(weights.length,5);
  const recent=weights.slice(-n);
  const days=(new Date(recent[n-1].date+'T12:00:00')-new Date(recent[0].date+'T12:00:00'))/(1000*60*60*24);
  if(days===0)return null;
  const kgPerDay=(recent[n-1].weight-recent[0].weight)/days;
  return kgPerDay;
}

  if(delId===s.id)return`<div class="sc"><div class="cfd"><p>¿Eliminar esta sesión?</p><div class="cfdb"><button class="bda" onclick="confDel('${s.id}')">Eliminar</button><button class="bca" onclick="cancelDel()">Cancelar</button></div></div></div>`;
  const dailyS=DAILY_STEPS.find(d=>d.date===s.date);
  const fb=fatBurnData(s);
  // Subsección 1 — datos del workout
  const stWorkout=[
    {l:hasAdj(s)?'Cal. workout (c/inclin.)':'Cal. workout',v:hasAdj(s)?calAdj(s):s.calories,u:'kcal',c:'var(--a4)'},
    hasAdj(s)?{l:'Cal. workout (reloj)',v:s.calories,u:'kcal',c:'var(--muted)'}:null,
    {l:'Cal. totales día',v:s.totalCalories?.toLocaleString(),u:'kcal',c:'var(--a4)'},
    {l:'Pasos ejercicio',v:s.steps?.toLocaleString(),u:'',c:'var(--a3)'},
    dailyS?{l:'Pasos totales día',v:dailyS.steps.toLocaleString(),u:'',c:dailyS.steps>=STEPS_GOAL?'var(--a3)':'var(--a2)'}:null,
    {l:'FC prom',v:s.hrAvg,u:'bpm',c:'var(--a2)'},
    {l:'FC máx',v:s.hrMax,u:'bpm',c:'var(--a2)'},
    {l:'Vel. prom',v:s.speedAvg,u:'km/h',c:'var(--a1)'},
    {l:'Vel. máx',v:s.speedMax,u:'km/h',c:'var(--a1)'},
    s.incline!=null?{l:'Inclinación',v:`${s.incline}%`,u:'',c:'var(--a5)'}:null,
    s.elevGain!=null?{l:'Gan. elev.',v:`${s.elevGain}m`,u:'',c:'var(--a3)'}:null,
  ].filter(x=>x&&x.v!==null&&x.v!==undefined);
  // Subsección 2 — análisis de grasa
  const stFat=fb?[
    {l:'% Grasa quemada',v:fb.pct+'%',u:'',c:'#f472b6'},
    {l:'Grasa — workout',v:fb.fatGW+'g',u:'('+fb.fatCalW+' kcal)',c:'#f472b6'},
    fb.fatGT?{l:'Grasa — día total',v:fb.fatGT+'g',u:'('+fb.fatCalT+' kcal)',c:'#ec4899'}:null,
  ].filter(Boolean):[];
  return`<div class="sc">
    <div class="sh"><div><div class="sd">${ext?'🚶 ':'🎚️ '}${fdate(s.date)}</div><div class="sm">${fd(s.duration)} · ${s.distance} km${s.note?' · '+s.note:''}</div></div>
    <div class="ab"><button class="ib" onclick="startEdit('${s.id}')" style="color:var(--a3)">✏️</button><button class="ib" onclick="startDel('${s.id}')" style="color:var(--a2)">🗑️</button></div></div>
    ${w?`<span class="badge" style="background:rgba(212,130,10,.12);border:1px solid rgba(212,130,10,.25)"><span>⚖️</span><span class="bv" style="color:var(--wt)">${w}</span><span class="bu">kg</span></span>`:''}
    ${p?`<span class="badge" style="background:rgba(255,69,0,.12);border:1px solid rgba(255,69,0,.25)"><span>🕐</span><span class="bv" style="color:var(--a5)">${p}</span><span class="bu">min/km</span></span>`:''}
    ${ENDURANCE_IDS.has(s.id)?`<span class="badge" style="background:rgba(168,85,247,.12);border:1px solid rgba(168,85,247,.25)"><span>🏎️</span><span class="bv" style="color:#a855f7;font-size:13px">Endurance</span></span>`:''}
    ${(()=>{
      const z=fcZone(s.hrAvg);
      if(!z)return '';
      const zid=s.id+'-zone';
      const isOpen=expZone===zid;
      const zones=FC_ZONES;
      const popup=isOpen?`<div style="background:rgba(0,0,0,.85);border:1px solid ${z.color}44;border-radius:10px;padding:10px 12px;margin-top:6px;display:flex;flex-direction:column;gap:5px">
        <div style="color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px">Zonas de FC</div>
        ${zones.map(zn=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 8px;border-radius:6px;background:${zn.label===z.label?zn.color+'22':'transparent'};border:1px solid ${zn.label===z.label?zn.color+'66':'transparent'}">
          <div style="display:flex;align-items:center;gap:6px"><span>${zn.icon}</span><span style="font-family:var(--fh);font-size:13px;color:${zn.color}">${zn.label}</span></div>
          <span style="font-family:var(--fm);font-size:10px;color:var(--muted)">${zn.min===0?'< 111 bpm':zn.max===999?'≥ 167 bpm':zn.min+' – '+zn.max+' bpm'} <span style="color:${zn.color};opacity:0.7">${zn.pct}</span></span>
        </div>`).join('')}
        <div style="color:var(--muted);font-family:var(--fm);font-size:9px;margin-top:4px;text-align:center">Tu FC promedio: <span style="color:${z.color}">${s.hrAvg} bpm</span></div>
      </div>`:'';
      return `<div><span class="badge" style="background:${z.color}18;border:1px solid ${z.color}44;cursor:pointer" onclick="expZone=expZone==='${zid}'?null:'${zid}';rContent()"><span>${z.icon}</span><span class="bv" style="color:${z.color};font-size:12px">${z.label}</span><span style="color:${z.color};font-size:10px;margin-left:4px">${isOpen?'▲':'▼'}</span></span>${popup}</div>`;
    })()}
    <div class="sl" style="margin-top:8px">📊 Datos del workout</div>
    <div class="g3">${stWorkout.map(x=>`<div class="sm2"><div class="sl2">${x.l}</div><div class="sv" style="color:${x.c}">${x.v} <span style="color:var(--muted);font-size:9px;font-weight:400">${x.u}</span></div></div>`).join('')}</div>
    ${stFat.length?`<div class="sl" style="margin-top:8px;border-color:rgba(244,114,182,.2)">🔥 Análisis de grasa quemada</div>
    <div class="g3">${stFat.map(x=>`<div class="sm2"><div class="sl2">${x.l}</div><div class="sv" style="color:${x.c}">${x.v} <span style="color:var(--muted);font-size:9px;font-weight:400">${x.u}</span></div></div>`).join('')}</div>`:''}
  </div>`;
}

// PROGRESO
function rStepsMeta(){
  const total=DAILY_STEPS.length;
  const met=DAILY_STEPS.filter(d=>d.steps>=STEPS_GOAL).length;
  const pct=Math.round((met/total)*100);
  const streak=((arr)=>{let c=0;for(let i=arr.length-1;i>=0;i--){if(arr[i].steps>=STEPS_GOAL)c++;else break;}return c;})(DAILY_STEPS);
  const avg=Math.round(DAILY_STEPS.reduce((a,d)=>a+d.steps,0)/total);
  const maxS=Math.max(...DAILY_STEPS.slice(-10).map(x=>x.steps));
  const bars=DAILY_STEPS.slice(-10).map(d=>{
    const h=Math.min(100,Math.round((d.steps/maxS)*100));
    const ok=d.steps>=STEPS_GOAL;
    return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px"><div style="width:100%;height:'+h+'%;background:'+(ok?'var(--a3)':'var(--a2)')+';border-radius:3px 3px 0 0;min-height:4px"></div></div>';
  }).join('');
  const labels=DAILY_STEPS.slice(-10).map(d=>'<div style="flex:1;text-align:center;font-family:var(--fm);font-size:7px;color:var(--muted)">'+d.date.slice(5)+'</div>').join('');
  const streakHtml=streak>0?'<div style="margin-top:8px;font-family:var(--fm);font-size:9px;color:var(--a3)">🔥 Racha actual: '+streak+' días consecutivos con meta cumplida</div>':'';
  return `<div class="card" style="border-color:rgba(57,255,110,.2)">
    <div style="color:var(--a3);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">👟 Meta de pasos diarios — ${STEPS_GOAL.toLocaleString()} pasos</div>
    <div class="g3" style="margin-bottom:12px">
      <div class="sm2"><div class="sl2">Días con meta</div><div class="sv" style="color:var(--a3)">${met}/<span style="color:var(--muted);font-size:11px">${total}</span></div></div>
      <div class="sm2"><div class="sl2">% cumplimiento</div><div class="sv" style="color:var(--a3)">${pct}%</div></div>
      <div class="sm2"><div class="sl2">Promedio diario</div><div class="sv" style="color:var(--a1)">${avg.toLocaleString()}</div></div>
    </div>
    <div style="color:var(--muted);font-family:var(--fm);font-size:9px;margin-bottom:6px">Últimos 10 días</div>
    <div style="display:flex;gap:4px;align-items:flex-end;height:50px">${bars}</div>
    <div style="display:flex;justify-content:space-between;margin-top:4px">${labels}</div>
    ${streakHtml}
  </div>`;
}
function rProg(){
  return`<div style="display:flex;flex-direction:column;gap:18px">
    <div class="stabs">${['General','Treadmill','Exterior'].map(t=>`<button class="stb${pSub===t?' on':''}" onclick="pSub='${t}';rContent()">${t==='Treadmill'?'🎚️ Treadmill':t==='Exterior'?'🚶 Exterior':'📊 General'}</button>`).join('')}</div>
    ${rStepsMeta()}
    <div id="ccon"></div>
  </div>`;
}
function rCharts(){
  const data=pSub==='Treadmill'?sessions.filter(s=>!isExt(s)):pSub==='Exterior'?sessions.filter(s=>isExt(s)):sessions;
  const cc=document.getElementById('ccon');if(!cc)return;
  if(data.length<2){cc.innerHTML='<div class="empty">Necesitas al menos 2 sesiones.</div>';return;}
  const lbl=data.map(s=>s.date.slice(5));
  const defs=[
    {id:'c1',label:'Distancia por sesión (km) · ↑ mejor',data:data.map(s=>s.distance),type:'bar',color:'#ff6b1a'},
    {id:'c2',label:'Velocidad promedio (km/h) · ↑ mejor',data:data.map(s=>s.speedAvg),type:'line',color:'#39ff6e',trendline:true},
    {id:'c3',label:'Pace promedio (min/km) · ↓ mejor',data:data.map(s=>s.duration&&s.distance?parseFloat(((s.duration*60)/s.distance/60).toFixed(2)):null),type:'line',color:'#ff4500'},
    {id:'c4',label:'Pasos por sesión · ↑ mejor',data:data.map(s=>s.steps),type:'bar',color:'#39ff6e'},
    {id:'c5',label:'Calorías (kcal) · ↑ mejor · 🟠 sin inclin. · 🔵 con inclin.',data:data.map(s=>calAdj(s)),type:'bar',color:'#ffa020',colorFn:s=>s.incline&&s.incline>0?'#00e5ff':'#ffa020'},
    {id:'c6',label:'FC promedio (bpm) · ↓ mejor',data:data.map(s=>s.hrAvg),type:'line',color:'#ff2020',yMin:90,yMax:160},
    {id:'c7',label:'Duración por sesión (min) · ↑ mejor',data:data.map(s=>s.duration),type:'line',color:'#60a5fa'},
    ...(pSub==='Treadmill'?[{id:'c8',label:'Inclinación (%) · contexto',data:data.map(s=>s.incline),type:'bar',color:'#ff4500',yMin:0,yMax:5}]:[]),
  ];
  cc.innerHTML=defs.map(d=>`<div class="cw"><div class="cl">${d.label}</div><div style="position:relative;height:150px"><canvas id="${d.id}"></canvas></div></div>`).join('');
  Chart.defaults.color='#8a9bb0';Chart.defaults.font.family="'DM Mono'";Chart.defaults.font.size=9;
  defs.forEach(d=>{
    const ctx=document.getElementById(d.id);if(!ctx)return;
    destroyChart(d.id);
    const bgColors=d.colorFn?data.map(s=>d.colorFn(s)+'88'):d.color+'88';
    const bdColors=d.colorFn?data.map(s=>d.colorFn(s)):d.color;
    const datasets=[{data:d.data,backgroundColor:bgColors,borderColor:bdColors,borderWidth:d.type==='line'?2:0,borderRadius:d.type==='bar'?4:0,pointRadius:d.type==='line'?3:0,pointHoverRadius:5,fill:d.type==='line'?{target:'origin',above:d.color+'18'}:false,tension:0.3,spanGaps:true}];
    if(d.trendline&&d.data.filter(x=>x!=null).length>1){
      const vals=d.data.map((v,i)=>({x:i,y:v})).filter(p=>p.y!=null);
      const n=vals.length,sx=vals.reduce((a,p)=>a+p.x,0),sy=vals.reduce((a,p)=>a+p.y,0);
      const sxy=vals.reduce((a,p)=>a+p.x*p.y,0),sxx=vals.reduce((a,p)=>a+p.x*p.x,0);
      const m=(n*sxy-sx*sy)/(n*sxx-sx*sx||1),b=(sy-m*sx)/n;
      const trendData=d.data.map((_,i)=>parseFloat((m*i+b).toFixed(2)));
      datasets.push({data:trendData,borderColor:'#ffffff55',borderWidth:1.5,borderDash:[4,4],pointRadius:0,fill:false,tension:0,spanGaps:true,label:'Tendencia'});
    }
    charts[d.id]=new Chart(ctx,{
      type:d.type,
      data:{labels:lbl,datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a0a0a',borderColor:d.color+'44',borderWidth:1}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{maxRotation:45}},y:{grid:{color:'rgba(255,255,255,.05)'},min:d.yMin??undefined,max:d.yMax??undefined}}},
    });
  });
}

// PESO
function rPeso(){
  const f=weights[0],l=weights[weights.length-1];
  const diff=weights.length>=2?(l.weight-f.weight).toFixed(2):null;
  const dc=diff<0?'var(--a3)':'var(--a2)';
  const today=new Date().toISOString().split('T')[0];
  const hitos=[{label:'Hito 1',target:95,icon:'🎯'},{label:'Hito 2',target:90,icon:'🔥'},{label:'Hito 3',target:85,icon:'💀'}];
  const trend=weightTrend();
  const TARGET=85;
  function projectionDate(kgPerDay,fromWeight,fromDate){
    if(!kgPerDay||kgPerDay>=0||fromWeight<=TARGET)return null;
    const days=Math.round((fromWeight-TARGET)/Math.abs(kgPerDay));
    return new Date(new Date(fromDate+'T12:00:00').getTime()+days*24*60*60*1000).toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'});
  }
  const projection=trend&&l?Math.round(Math.abs((l.weight-TARGET)/trend)):null;
  const projDate=trend&&l&&trend<0?projectionDate(trend,l.weight,l.date):null;
  const projOpt=l?projectionDate(-0.5/7,l.weight,l.date):null;
  const projMid=l?projectionDate(-0.3/7,l.weight,l.date):null;
  const projCons=l?projectionDate(-0.15/7,l.weight,l.date):null;
  return`<div style="display:flex;flex-direction:column;gap:20px">
    <div style="color:var(--a5);font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase">⚖️ Seguimiento de peso</div>
    ${weights.length>=2?`<div class="g3">
      <div class="card" style="border-color:rgba(255,69,0,.3)"><div style="color:var(--muted);font-size:9px;font-family:var(--fm);text-transform:uppercase">Peso inicial</div><div style="color:var(--a5);font-family:var(--fh);font-weight:700;font-size:22px">${f.weight} <span style="font-size:11px;color:var(--muted)">kg</span></div><div style="color:var(--muted);font-size:9px;font-family:var(--fm)">${f.date.slice(5)}</div></div>
      <div class="card" style="border-color:rgba(255,69,0,.3)"><div style="color:var(--muted);font-size:9px;font-family:var(--fm);text-transform:uppercase">Peso actual</div><div style="color:var(--a5);font-family:var(--fh);font-weight:700;font-size:22px">${l.weight} <span style="font-size:11px;color:var(--muted)">kg</span></div><div style="color:var(--muted);font-size:9px;font-family:var(--fm)">${l.date.slice(5)}</div></div>
      <div class="card" style="border-color:${dc}44"><div style="color:var(--muted);font-size:9px;font-family:var(--fm);text-transform:uppercase">Diferencia</div><div style="color:${dc};font-family:var(--fh);font-weight:700;font-size:22px">${Number(diff)>0?'+':''}${diff} <span style="font-size:11px;color:var(--muted)">kg</span></div></div>
    </div>`:''}
    ${l?`<div class="card" style="border-color:rgba(255,107,26,.2)">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div><div style="color:var(--muted);font-size:9px;font-family:var(--fm);text-transform:uppercase;margin-bottom:4px">IMC actual</div>
        ${(()=>{const imc=(l.weight/(1.78*1.78)).toFixed(1);const cat=imc<18.5?{l:'Bajo peso',c:'#60a5fa'}:imc<25?{l:'Normal',c:'var(--a3)'}:imc<30?{l:'Sobrepeso',c:'var(--a4)'}:imc<35?{l:'Obesidad I',c:'var(--a2)'}:{l:'Obesidad II',c:'#ff0000'};return '<div style="display:flex;align-items:baseline;gap:8px"><span style="color:'+cat.c+';font-family:var(--fh);font-weight:700;font-size:28px">'+imc+'</span><span style="color:'+cat.c+';font-family:var(--fh);font-size:13px">'+cat.l+'</span></div>';})()} 
        <div style="color:var(--muted);font-family:var(--fm);font-size:9px;margin-top:2px">178 cm · ${l.weight} kg</div></div>
        <div style="text-align:right"><div style="color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;margin-bottom:4px">IMC meta (85 kg)</div>
        <div style="color:var(--a3);font-family:var(--fh);font-weight:700;font-size:20px">${(85/(1.78*1.78)).toFixed(1)}</div>
        <div style="color:var(--muted);font-family:var(--fm);font-size:9px">Normal</div></div>
      </div>
    </div>`:''}
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="sl">🏁 Hitos de pérdida de peso</div>
      ${hitos.map(h=>{
        const cur=l?l.weight:f.weight,start=f.weight;
        const tl=start-h.target,lost=start-cur;
        const pct=Math.min(100,Math.max(0,tl>0?(lost/tl)*100:0));
        const reached=cur<=h.target,rem=Math.max(0,cur-h.target).toFixed(2);
        const achievedEntry=weights.find(w=>w.weight<=h.target);
        const achievedDate=achievedEntry?new Date(achievedEntry.date+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}):null;
        return`<div class="card" style="border-color:${reached?'var(--a3)':'rgba(255,255,255,.08)'}">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
            <div style="display:flex;align-items:center;gap:8px"><span style="font-size:18px">${reached?'✅':h.icon}</span>
            <div><div style="font-family:var(--fh);font-weight:700;font-size:15px;color:${reached?'var(--a3)':'var(--a1)'}"> ${h.label} — ${h.target} kg</div>
            <div style="font-family:var(--fm);font-size:9px;color:var(--muted)">${reached?'¡COMPLETADO!':'Faltan '+rem+' kg'}</div>
            ${reached&&achievedDate?`<div style="font-family:var(--fm);font-size:9px;color:var(--a3);margin-top:2px">📅 ${achievedDate}</div>`:''}</div></div>
            <div style="font-family:var(--fh);font-weight:800;font-size:22px;color:${reached?'var(--a3)':'var(--a1)'}">${pct.toFixed(0)}<span style="font-size:12px;color:var(--muted)">%</span></div>
          </div>
          <div class="hb-bg"><div class="hb-f" style="width:${pct}%;background:${reached?'var(--a3)':'linear-gradient(90deg,var(--a1),var(--a4))'}"></div></div>
        </div>`;
      }).join('')}
    </div>
    ${l&&l.weight>85?`<div class="card" style="border-color:rgba(57,255,110,.2);background:rgba(57,255,110,.04)">
      <div style="color:var(--a3);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="font-size:14px">📈</span>Proyecciones para llegar a 85 kg</div>
      <div style="display:flex;flex-direction:column;gap:8px">
        ${trend&&trend<0&&projDate?`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,160,32,.08);border-radius:8px;border-left:3px solid var(--a4)"><div><div style="font-family:var(--fm);font-size:9px;color:var(--muted)">Tu ritmo actual</div><div style="font-family:var(--fm);font-size:9px;color:var(--a4)">${(trend*7).toFixed(2)} kg/sem · puede incluir agua</div></div><div style="font-family:var(--fh);font-weight:700;font-size:14px;color:var(--a4)">${projDate}</div></div>`:''}
        ${projOpt?`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(57,255,110,.08);border-radius:8px;border-left:3px solid var(--a3)"><div><div style="font-family:var(--fm);font-size:9px;color:var(--muted)">Optimista</div><div style="font-family:var(--fm);font-size:9px;color:var(--a3)">0.5 kg/semana</div></div><div style="font-family:var(--fh);font-weight:700;font-size:14px;color:var(--a3)">${projOpt}</div></div>`:''}
        ${projMid?`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,107,26,.08);border-radius:8px;border-left:3px solid var(--a1)"><div><div style="font-family:var(--fm);font-size:9px;color:var(--muted)">Realista</div><div style="font-family:var(--fm);font-size:9px;color:var(--a1)">0.3 kg/semana</div></div><div style="font-family:var(--fh);font-weight:700;font-size:14px;color:var(--a1)">${projMid}</div></div>`:''}
        ${projCons?`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:rgba(255,32,32,.08);border-radius:8px;border-left:3px solid var(--a2)"><div><div style="font-family:var(--fm);font-size:9px;color:var(--muted)">Conservador</div><div style="font-family:var(--fm);font-size:9px;color:var(--a2)">0.15 kg/semana</div></div><div style="font-family:var(--fh);font-weight:700;font-size:14px;color:var(--a2)">${projCons}</div></div>`:''}
      </div>
    </div>`:''}

// CALENDARIO
function rCal(){
  const mn=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dn=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const fd2=new Date(cY,cM,1).getDay(),dim=new Date(cY,cM+1,0).getDate();
  const smap={};sessions.forEach(s=>{if(!smap[s.date])smap[s.date]=[];smap[s.date].push(isExt(s)?'e':'t');});
  const eset=new Set(sessions.filter(s=>ENDURANCE_IDS.has(s.id)).map(s=>s.date));
  const wset=new Set(weights.map(w=>w.date));
  const today=new Date();
  const cells=[];for(let i=0;i<fd2;i++)cells.push('');for(let d=1;d<=dim;d++)cells.push(d);

  const calRows=cells.map((day,i)=>{
    if(!day)return'<div></div>';
    const ds=`${cY}-${String(cM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const types=smap[ds]||[];const hasTm=types.includes('t'),hasE=types.includes('e'),hasW=wset.has(ds),hasEnd=eset.has(ds);
    const isTod=today.getFullYear()===cY&&today.getMonth()===cM&&today.getDate()===day;
    const isSel=selDay===ds;const hasAny=types.length||hasW||hasEnd;
    return`<div class="cal-c${hasAny?' hs2':''}${isSel?' sel':''}" style="${isTod&&!isSel?'border-color:rgba(255,107,26,.4);background:rgba(255,107,26,.08);':''}" onclick="${hasAny?`tDay('${ds}')`:''}" >
      <div class="cal-dots">
        ${hasTm?`<div style="width:8px;height:8px;border-radius:50%;background:var(--a5)"></div>`:''}
        ${hasE?`<div style="width:8px;height:8px;border-radius:50%;background:var(--a3)"></div>`:''}
        ${hasW?`<div style="width:8px;height:8px;border-radius:50%;background:var(--wt)"></div>`:''}
        ${hasEnd?`<div style="width:8px;height:8px;border-radius:50%;background:#a855f7"></div>`:''}
      </div>
      <div class="cal-num" style="color:${hasAny?'#e8f0fe':'#4a5568'};font-weight:${hasAny?700:400}">${day}</div>
      ${types.length>1?`<div class="cal-cnt">${types.length} ses.</div>`:''}

  let det='';
  if(selDay){

    det=`<div class="cal-det">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="font-family:var(--fh);font-weight:700;font-size:16px;color:var(--a1);text-transform:capitalize">📅 ${dl}</div>
        <button onclick="selDay=null;rContent()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px">✕</button>
      </div>
      ${we?`<div style="display:flex;align-items:center;gap:10px;background:rgba(212,130,10,.12);border:1px solid rgba(212,130,10,.3);border-radius:10px;padding:8px 12px;margin-bottom:8px"><span>⚖️</span><span style="color:var(--muted);font-family:var(--fm);font-size:10px;text-transform:uppercase">Peso</span><span style="color:var(--wt);font-family:var(--fh);font-weight:700;font-size:22px;margin-left:auto">${we.weight} <span style="font-size:12px;color:var(--muted);font-weight:400">kg</span></span></div>`:''}
      ${ds2.map(s=>{
        const p2=pace(s.duration,s.distance),ext2=isExt(s);
        return`<div style="background:rgba(255,255,255,.04);border-radius:10px;padding:10px 12px;border-left:3px solid ${ext2?'var(--a3)':'var(--a5)'};margin-bottom:8px">

            <div style="font-family:var(--fh);font-weight:700;font-size:15px;color:${ext2?'var(--a3)':'var(--a5)'}">${ext2?'🚶 ':'🎚️ '}${ext2?(s.note||'Exterior'):'Treadmill'}</div>
            <div style="font-family:var(--fm);font-size:10px;color:var(--muted)">${fd(s.duration)} · ${s.distance} km</div>

        </div>`;
      }).join('')}
    </div>`;

  const buildSum=(label,color,arr)=>{if(!arr.length)return'';const t=tots(arr),tm=arr.filter(s=>!isExt(s)).length,ex=arr.filter(s=>isExt(s)).length;

  const ys=sessions.filter(s=>new Date(s.date+'T12:00:00').getFullYear()===cY);

  return`<div>

      <div class="cal-li"><div class="dot" style="background:var(--a3)"></div><span style="color:var(--muted);font-family:var(--fm);font-size:10px">Exterior</span></div>
      <div class="cal-li"><div class="dot" style="background:var(--wt)"></div><span style="color:var(--muted);font-family:var(--fm);font-size:10px">Peso</span></div>
      <div class="cal-li"><div class="dot" style="background:#a855f7"></div><span style="color:var(--muted);font-family:var(--fm);font-size:10px">Endurance</span></div>
    </div>
    <div class="cal-g">
      ${dn.map(d=>`<div class="cal-dn">${d}</div>`).join('')}
      ${calRows}
    </div>
    ${det}
    <div style="margin-top:16px">
      ${buildSum(`📅 ${mn[cM]} ${cY}`,'var(--a1)',ms)}
      ${buildSum(`📆 Año ${cY}`,'var(--a4)',ys)}
      ${buildSum('🌐 Global','var(--a5)',sessions)}
    </div>
  </div>`;
}

      <div style="margin-bottom:14px"><div style="color:var(--muted);font-family:var(--fm);font-size:9px;margin-bottom:6px">Velocidad promedio (km/h) · ↑ mejor</div><div style="position:relative;height:140px"><canvas id="ec2"></canvas></div></div>
      <div style="margin-bottom:14px"><div style="color:var(--muted);font-family:var(--fm);font-size:9px;margin-bottom:6px">FC promedio (bpm) · ↓ mejor</div><div style="position:relative;height:140px"><canvas id="ec3"></canvas></div></div>
      <div style="margin-bottom:14px"><div style="color:var(--muted);font-family:var(--fm);font-size:9px;margin-bottom:6px">Duración (min) · ↑ mejor</div><div style="position:relative;height:140px"><canvas id="ec4"></canvas></div></div>
    </div>
  </div>`;
}
function rEndCharts(){
  const endS=sessions.filter(s=>ENDURANCE_IDS.has(s.id)).sort((a,b)=>a.date.localeCompare(b.date));
  if(endS.length<1)return;
  const lbl=endS.map(s=>s.date.slice(5));
  const defs=[
    {id:'ec1',data:endS.map(s=>s.distance),color:'#a855f7',type:'bar'},
    {id:'ec2',data:endS.map(s=>s.speedAvg),color:'#ff6b1a',type:'line'},
    {id:'ec3',data:endS.map(s=>s.hrAvg),color:'#ff2020',type:'line'},
    {id:'ec4',data:endS.map(s=>s.duration),color:'#60a5fa',type:'bar'},
  ];
  Chart.defaults.color='#8a9bb0';Chart.defaults.font.family="'DM Mono'";Chart.defaults.font.size=9;
  defs.forEach(d=>{
    const ctx=document.getElementById(d.id);if(!ctx)return;
    destroyChart(d.id);
    charts[d.id]=new Chart(ctx,{
      type:d.type,
      data:{labels:lbl,datasets:[{data:d.data,backgroundColor:d.color+'88',borderColor:d.color,borderWidth:d.type==='line'?2:0,borderRadius:d.type==='bar'?4:0,pointRadius:3,pointHoverRadius:5,fill:false,tension:0.3,spanGaps:true}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a0a0a',borderColor:d.color+'44',borderWidth:1}},scales:{x:{grid:{color:'rgba(255,255,255,.05)'}},y:{grid:{color:'rgba(255,255,255,.05)'}}}}
    });
  });
}
function prevEndM(){const d=new Date(cY,cM-1,1);cY=d.getFullYear();cM=d.getMonth();selEndDay=null;rContent();}
function nextEndM(){const d=new Date(cY,cM+1,1);cY=d.getFullYear();cM=d.getMonth();selEndDay=null;rContent();}
function tEndDay(ds){selEndDay=selEndDay===ds?null:ds;rContent();}

// RECORDS
function rRecs(){
  const tread=sessions.filter(s=>!isExt(s)),all=sessions;
  const med=['🥇','🥈','🥉','4️⃣','5️⃣'];
  const top5=(arr,k,o='desc')=>[...arr].filter(s=>s[k]!=null&&s[k]>0).sort((a,b)=>o==='desc'?b[k]-a[k]:a[k]-b[k]).slice(0,5);
  const top5p=arr=>[...arr].filter(s=>s.duration&&s.distance).map(s=>({...s,pv:(s.duration*60)/s.distance})).sort((a,b)=>a.pv-b.pv).slice(0,5);
  const RB=(title,icon,rows,vfn,color)=>{
    if(!rows.length)return'';
    return`<div class="card" style="border-color:${color}33;margin-bottom:12px">
      <div style="color:${color};font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px"><span style="font-size:14px">${icon}</span>${title}</div>
      ${rows.map((s,i)=>{
        const val=vfn(s),rk=s.id+'-'+title,isSel=expRec===rk,isF=i===0;
        const det=[{l:'Fecha',v:new Date(s.date+'T12:00:00').toLocaleDateString('es-MX',{day:'numeric',month:'short',year:'numeric'}),c:color},{l:'Duración',v:fd(s.duration),c:'var(--a3)'},{l:'Distancia',v:`${s.distance} km`,c:'var(--a1)'},{l:'Cal.',v:`${s.calories} kcal`,c:'var(--a4)'},{l:'FC prom',v:`${s.hrAvg} bpm`,c:'var(--a2)'},{l:'Pasos',v:s.steps?.toLocaleString(),c:'var(--a3)'},{l:'Vel.',v:`${s.speedAvg} km/h`,c:'var(--a1)'},s.incline!=null?{l:'Inclin.',v:`${s.incline}%`,c:'var(--a5)'}:null,s.note?{l:'Nota',v:s.note,c:'var(--muted)'}:null].filter(x=>x&&x.v!=null);
        return`<div>
          <div class="rr" style="background:${isSel?color+'28':isF?color+'18':'rgba(255,255,255,.02)'};border:1px solid ${isSel?color+'88':isF?color+'44':'transparent'}" onclick="expRec=expRec==='${rk}'?null:'${rk}';rContent()">
            <span style="font-size:16px;min-width:22px">${med[i]}</span>
            <div style="flex:1"><div style="font-family:var(--fh);font-weight:700;font-size:18px;color:${isF||isSel?color:'var(--text)'}">${val}</div><div style="font-family:var(--fm);font-size:9px;color:var(--muted)">${fdshort(s.date)} · ${isExt(s)?'🚶 Ext':'🎚️ TM'}</div></div>
            <span style="color:var(--muted);font-size:12px">${isSel?'▲':'▼'}</span>
          </div>
          ${isSel?`<div class="rd" style="background:${color}0d;border:1px solid ${color}33"><div class="g3">${det.map(x=>`<div class="sm2"><div class="sl2">${x.l}</div><div class="sv" style="color:${x.c};font-size:13px">${x.v}</div></div>`).join('')}</div></div>`:''}
        </div>`;
      }).join('')}
    </div>`;
  };
  return`<div>
    <div style="color:var(--a1);font-family:var(--fh);font-size:17px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px">🏆 Records — Top 5</div>
    ${RB('Distancia','📍',top5(all,'distance'),s=>`${s.distance} km`,'var(--a1)')}
    ${RB('Duración','⏱️',top5(all,'duration'),s=>fd(s.duration),'var(--a3)')}
    ${RB('Calorías activas','🔥',top5(all,'calories'),s=>`${s.calories} kcal`,'var(--a4)')}
    ${RB('Pasos','👟',top5(all,'steps'),s=>s.steps?.toLocaleString(),'var(--a3)')}
    ${RB('Mejor pace','🕐',top5p(all),s=>{const sec=s.pv;return`${Math.floor(sec/60)}:${String(Math.round(sec%60)).padStart(2,'0')} min/km`;},'var(--a5)')}
    ${RB('FC más baja (treadmill)','❤️',top5(tread,'hrAvg','asc'),s=>`${s.hrAvg} bpm`,'var(--a2)')}
    ${RB('FC más alta','❤️‍🔥',top5(all,'hrAvg','desc'),s=>`${s.hrAvg} bpm`,'var(--a2)')}
    ${RB('Vel. más alta (TM)','⚡',top5(tread,'speedAvg','desc'),s=>`${s.speedAvg} km/h`,'var(--a1)')}
  </div>`;
}

// TOTALES
function rTots(){
  const t=tots(sessions);
  const SC=(icon,label,val,unit,color)=>`<div class="stc" style="border:1px solid ${color}33"><span style="font-size:18px">${icon}</span><span class="stc-l">${label}</span><div><span class="stc-v" style="color:${color}">${val}</span>${unit?`<span class="stc-u">${unit}</span>`:''}</div></div>`;
  const streak2=getStreaks();
  const thisW=weekSessions(0),lastW=weekSessions(1);
  const tW=tots(thisW),tLW=tots(lastW);
  const diffDist=(tW.dist-tLW.dist).toFixed(2);
  const diffCal=tW.cal-tLW.cal;
  const diffSes=tW.n-tLW.n;
  const arrow=(v)=>Number(v)>0?'▲':Number(v)<0?'▼':'—';
  const arrowC=(v)=>Number(v)>0?'var(--a3)':Number(v)<0?'var(--a2)':'var(--muted)';
  return`<div style="display:flex;flex-direction:column;gap:10px">
    <div style="color:var(--a1);font-family:var(--fh);font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px">Acumulado histórico</div>
    <div class="g2">
      ${SC('🎚️','Sesiones',t.n,'','var(--a1)')}${SC('⏱️','Tiempo total',fd(t.dur),'','var(--a3)')}
      ${SC('📍','Distancia total',t.dist.toFixed(2),'km','var(--a1)')}${SC('👟','Pasos totales',t.steps.toLocaleString(),'','var(--a3)')}
      ${SC('🔥','Calorías',t.cal.toLocaleString(),'kcal','var(--a4)')}${SC('🕐','Pace promedio',t.ap,'min/km','var(--a5)')}
      ${(()=>{
        const totalFatGW=sessions.reduce((a,s)=>{const fb=fatBurnData(s);return a+(fb?fb.fatGW:0);},0);
        const totalFatCalW=sessions.reduce((a,s)=>{const fb=fatBurnData(s);return a+(fb?fb.fatCalW:0);},0);
        return SC('🫀','Grasa quemada (workout)',totalFatGW.toLocaleString(),'g','#f472b6')+SC('💧','Cal. grasa (workout)',totalFatCalW.toLocaleString(),'kcal','#f472b6');
      })()}
      ${SC('⚡','Vel. promedio',t.as,'km/h','var(--a1)')}${SC('❤️','FC promedio',t.ah,'bpm','var(--a2)')}
    </div>
    <div style="color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:8px;margin-bottom:2px">Promedios por sesión</div>
    <div class="g2">
      ${SC('📍','Distancia prom.',(t.dist/t.n).toFixed(2),'km','var(--a1)')}${SC('⏱️','Duración prom.',fd(Math.round(t.dur/t.n)),'','var(--a3)')}
      ${SC('🔥','Cal. prom.',Math.round(t.cal/t.n),'kcal','var(--a4)')}${SC('👟','Pasos prom.',Math.round(t.steps/t.n).toLocaleString(),'','var(--a3)')}
    </div>
    <div style="color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:8px;margin-bottom:2px">Esta semana vs semana anterior</div>
    <div class="g2">
      ${SC('🎚️','Sesiones',tW.n+(tLW.n?` <span style="color:${arrowC(diffSes)};font-size:13px">${arrow(diffSes)}${Math.abs(diffSes)}</span>`:''),'','var(--a1)')}
      ${SC('📍','Distancia',tW.dist.toFixed(2)+(tLW.dist?` <span style="color:${arrowC(diffDist)};font-size:13px">${arrow(diffDist)}${Math.abs(diffDist)}</span>`:''),'km','var(--a1)')}
      ${SC('🔥','Calorías',tW.cal+(tLW.cal?` <span style="color:${arrowC(diffCal)};font-size:13px">${arrow(diffCal)}${Math.abs(diffCal)}</span>`:''),'kcal','var(--a4)')}
      ${SC('⏱️','Tiempo',fd(tW.dur),'','var(--a3)')}
    </div>
    <div style="color:var(--muted);font-family:var(--fm);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:8px;margin-bottom:2px">Rachas</div>
    <div class="g2">
      ${SC('🔥','Racha activa',streak2.cur>0?streak2.cur+' días':'0 días','','var(--a4)')}
      ${SC('🏆','Racha máxima',streak2.max+' días','','var(--a1)')}
    </div>
  </div>`;
}

render();
</script>
</body>
</html>
